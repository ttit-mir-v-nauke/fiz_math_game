<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир в науке | Биология • Химия • Физика • Математика</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #0a0c1a, #020617);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20% 40%, rgba(0,255,255,0.2), transparent),
                              radial-gradient(1px 1px at 80% 70%, rgba(255,0,255,0.2), transparent),
                              repeating-linear-gradient(45deg, rgba(0,255,255,0.02) 0px, rgba(0,255,255,0.02) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        header {
            background: rgba(10, 15, 30, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,255,255,0.2);
            margin-bottom: 35px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            font-size: 2rem;
            background: linear-gradient(145deg, #00f5ff, #7c3aed);
            width: 54px;
            height: 54px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0,245,255,0.5);
        }

        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5f3fc, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .subject-nav {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .subject-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 60px;
            background: rgba(20, 30, 55, 0.7);
            color: #cbd5e1;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 245, 255, 0.3);
        }

        .subject-btn:hover {
            background: rgba(0, 245, 255, 0.15);
            transform: translateY(-2px);
            border-color: #00f5ff;
            box-shadow: 0 0 12px rgba(0,245,255,0.3);
        }

        .subject-btn.active {
            background: linear-gradient(135deg, #00f5ff, #7c3aed);
            border: none;
            box-shadow: 0 6px 16px rgba(0,245,255,0.5);
            color: white;
        }

        .subject-selection {
            text-align: center;
            padding: 50px 20px;
        }

        .selection-title {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a5f3fc, #f0abfc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .selection-subtitle {
            font-size: 1.1rem;
            color: #9ca3af;
            margin-bottom: 55px;
        }

        .subject-cards {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .subject-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 42px 32px;
            width: 350px;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 245, 255, 0.25);
            cursor: pointer;
        }

        .subject-card:hover {
            transform: translateY(-12px);
            border-color: #00f5ff;
            background: rgba(30, 40, 70, 0.8);
            box-shadow: 0 30px 40px -20px rgba(0,245,255,0.3);
        }

        .subject-icon {
            font-size: 4.2rem;
            margin-bottom: 24px;
        }

        .subject-card.biology .subject-icon { color: #10b981; filter: drop-shadow(0 0 8px #10b981); }
        .subject-card.chemistry .subject-icon { color: #10b981; filter: drop-shadow(0 0 8px #10b981); }
        .subject-card.math .subject-icon { color: #f97316; filter: drop-shadow(0 0 8px #f97316); }
        .subject-card.physics .subject-icon { color: #3b82f6; filter: drop-shadow(0 0 8px #3b82f6); }

        .subject-card h2 {
            font-size: 2rem;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .subject-card p {
            color: #9ca3af;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .subject-content {
            display: none;
            animation: fadeSlide 0.45s ease-out;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .subject-content.active {
            display: block;
        }

        .content-section {
            background: rgba(10, 20, 40, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 36px;
            padding: 28px 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(0, 245, 255, 0.2);
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .section-title {
            font-size: 1.7rem;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-weight: 600;
        }

        .section-title i {
            background: linear-gradient(145deg, #00f5ff, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .teams-control {
            display: flex;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .team-input-container {
            flex: 1;
            min-width: 210px;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 12px 20px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .team-input-container:hover {
            background: rgba(0,0,0,0.5);
            border-color: #00f5ff;
        }

        .team-input-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9ca3af;
            letter-spacing: 1px;
        }

        .team-input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 245, 255, 0.4);
            border-radius: 40px;
            color: #f1f5f9;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .team-input:focus {
            border-color: #00f5ff;
            outline: none;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 3px rgba(0,245,255,0.2);
        }

        .teams-display {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
            justify-content: center;
        }

        .team-card {
            background: linear-gradient(145deg, #0f172a, #030712);
            border-radius: 28px;
            padding: 18px 24px;
            min-width: 200px;
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 245, 255, 0.4);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        .team-card.current {
            transform: scale(1.02);
            background: linear-gradient(145deg, #1e1a4d, #2d2a6e);
            border: 1px solid #00f5ff;
            box-shadow: 0 15px 30px -10px rgba(0,245,255,0.5);
        }

        .team-card.current::after {
            content: 'ХОД';
            position: absolute;
            top: 12px;
            right: 16px;
            background: #10b981;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 0 6px #10b981;
        }

        .team-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .team-name i {
            font-size: 1rem;
            color: #facc15;
        }

        .team-score {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .quiz-table-section {
            overflow-x: auto;
        }

        .quiz-table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 24px;
            overflow: hidden;
        }

        .quiz-table th {
            background: rgba(0, 0, 0, 0.6);
            padding: 14px;
            text-align: center;
            font-weight: 600;
            color: #facc15;
            border-bottom: 1px solid #00f5ff;
        }

        .quiz-table td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 245, 255, 0.15);
        }

        .topic-cell {
            background: rgba(0, 245, 255, 0.15);
            font-weight: 600;
            text-align: left;
            color: #bae6fd;
        }

        .question-cell {
            cursor: pointer;
            transition: all 0.2s;
        }

        .question-cell:hover {
            background: rgba(0, 245, 255, 0.3) !important;
        }

        .question-cell.answered {
            background: rgba(16, 185, 129, 0.2);
        }

        .question-cell.answered.wrong {
            background: rgba(239, 68, 68, 0.2);
        }

        .question-points {
            font-size: 1.2rem;
            font-weight: 700;
            color: #facc15;
        }

        .question-modal, .scientist-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .question-modal.active, .scientist-modal.active {
            display: flex;
        }

        .question-content, .scientist-modal-content {
            background: #0f172f;
            border-radius: 36px;
            padding: 32px;
            max-width: 720px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #00f5ff;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 18px;
            right: 20px;
            background: #ef4444;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .close-modal:hover {
            transform: rotate(90deg);
            background: #dc2626;
        }

        .question-text {
            font-size: 1.1rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .answers-container {
            display: grid;
            gap: 10px;
            margin-bottom: 24px;
        }

        .answer-btn {
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 40px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            color: #e2e8f0;
        }

        .answer-btn:hover {
            border-color: #00f5ff;
            background: #1e293b;
            transform: translateX(5px);
        }

        .answer-btn.selected {
            border-color: #00f5ff;
            background: rgba(0, 245, 255, 0.3);
        }

        .task {
            background: #0f172a;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 5px solid #00f5ff;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .task-number {
            font-weight: 700;
            font-size: 1.1rem;
            color: #7dd3fc;
        }

        .task-attempts {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .attempt-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #334155;
        }

        .attempt-dot.used {
            background: #ef4444;
        }

        .answer-input-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .answer-input {
            flex: 1;
            padding: 10px 18px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 40px;
            color: #f1f5f9;
        }

        .answer-input:focus {
            border-color: #00f5ff;
            outline: none;
        }

        .task-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #00f5ff, #7c3aed);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.05);
        }

        .task-feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 20px;
            display: none;
        }

        .task-feedback.correct {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            display: block;
        }

        .task-feedback.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            display: block;
        }

        .scientists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .scientist-card {
            background: #0f172a;
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            border: 1px solid #334155;
        }

        .scientist-card:hover {
            transform: translateY(-6px);
            border-color: #00f5ff;
        }

        .scientist-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #1e293b;
        }

        .scientist-info {
            padding: 18px;
        }

        .scientist-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .scientist-field {
            color: #7dd3fc;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .scientist-facts {
            font-size: 0.8rem;
            color: #9ca3af;
            line-height: 1.4;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #334155;
            color: #f1f5f9;
            font-size: 0.9rem;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #00f5ff, #7c3aed);
        }

        .action-btn.secondary {
            background: #1e293b;
            border: 1px solid #475569;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        footer {
            background: rgba(5, 5, 20, 0.8);
            backdrop-filter: blur(12px);
            padding: 24px 20px;
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid rgba(0, 245, 255, 0.2);
        }

        .footer-developers {
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            header { flex-direction: column; text-align: center; }
            .selection-title { font-size: 1.8rem; }
            .team-card { min-width: 100%; }
            .action-btn { padding: 8px 18px; font-size: 0.8rem; }
            .quiz-table { font-size: 0.7rem; }
            .subject-card { width: 100%; max-width: 280px; padding: 24px; }
            .subject-nav { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-dna"></i></div>
                <div class="logo-text">
                    <h1>Мир в науке</h1>
                    <p>Биология • Химия • Физика • Математика • 10-11 классы</p>
                </div>
            </div>
            <div class="subject-nav" id="subject-nav"></div>
        </header>

        <section class="subject-selection" id="subject-selection">
            <h1 class="selection-title">Выберите предмет для изучения</h1>
            <p class="selection-subtitle">Интерактивные квизы, задачи, учёные и мини-игры для команд</p>
            <div class="subject-cards" id="subject-cards"></div>
        </section>

        <div id="subjects-container"></div>
    </div>

    <div class="question-modal" id="question-modal"><div class="question-content"><button class="close-modal" id="close-question-modal"><i class="fas fa-times"></i></button><div id="question-data"></div></div></div>
    <div class="scientist-modal" id="scientist-modal"><div class="scientist-modal-content"><button class="close-modal" id="close-scientist-modal"><i class="fas fa-times"></i></button><div id="scientist-data"></div></div></div>

    <footer><div class="footer-developers">Разработан студентами Томского техникума информационных технологий "ТТИТ":<br>Болохова Ксения Максимовна • Луговской Данил Кириллович</div></footer>

    <script>
        const subjectsList = ['math', 'physics', 'chemistry', 'biology'];
        const subjectNames = {
            math: 'Математика', physics: 'Физика', chemistry: 'Химия', biology: 'Биология'
        };
        const subjectIcons = {
            math: 'fa-calculator', physics: 'fa-atom', chemistry: 'fa-flask', biology: 'fa-leaf'
        };

        const teamsData = {};
        subjectsList.forEach(sub => {
            teamsData[sub] = [
                { name: getDefaultTeamName(sub, 0), score: 0, isCurrent: true },
                { name: getDefaultTeamName(sub, 1), score: 0, isCurrent: false }
            ];
        });

        function getDefaultTeamName(sub, idx) {
            const defaults = {
                math: ['Геометры','Алгебраисты'], physics: ['Протоны','Электроны'],
                chemistry: ['Менделеевы','Лавуазье'], biology: ['Цитологи','Генетики']
            };
            return defaults[sub][idx];
        }

        const quizzes = {
            math: {
                topics: ['Тригонометрия','Логарифмы','Производные','Интегралы','Вероятность'],
                questions: [
                    [{points:10,q:'sin(π/6)?',a:['1/2','√2/2','√3/2','1'],c:0},{points:20,q:'2sin²x-1=0 на [0,2π]',a:['π/4,3π/4','π/4,3π/4,5π/4,7π/4','π/2,3π/2','0,π'],c:1},{points:30,q:'(sinα+cosα)²+(sinα-cosα)²',a:['1','2','sin²α+cos²α','0'],c:1},{points:40,q:'sin75°·cos15°',a:['1/4','1/2','√3/4','(√6+√2)/4'],c:0},{points:50,q:'sinx+cosx=1',a:['x=2πk, x=π/2+2πk','x=πk, x=π/2+2πk','x=0,π/2','x=π/2+2πk'],c:0}],
                    [{points:10,q:'log₂8?',a:['2','3','4','5'],c:1},{points:20,q:'log₃(x+1)=2',a:['8','9','10','11'],c:0},{points:30,q:'log₅125+log₅25-log₅5',a:['3','4','5','6'],c:1},{points:40,q:'log₀.₅(2x-1)>2',a:['x<1.25','x>1.25','0.5<x<0.625','x<0.5'],c:2},{points:50,q:'2ˣ·3ʸ=72, log₂x+log₂y=3',a:['x=6,y=2','x=8,y=1','x=4,y=4','x=3,y=4'],c:0}],

        function renderSubjectSelection() {
            const container = document.getElementById('subject-cards');
            container.innerHTML = '';
            subjectsList.forEach(sub => {
                const card = document.createElement('div');
                card.className = `subject-card ${sub}`;
                card.setAttribute('data-subject', sub);
                card.innerHTML = `
                    <div class="subject-icon"><i class="fas ${subjectIcons[sub]}"></i></div>
                    <h2>${subjectNames[sub]}</h2>
                    <p>Квизы, задачи, учёные и игры</p>
                    <div class="action-buttons"><button class="action-btn primary start-subject" data-subject="${sub}">Начать</button></div>
                `;
                container.appendChild(card);
            });
            document.querySelectorAll('.start-subject').forEach(btn => btn.addEventListener('click', e => {
                e.stopPropagation();
                startSubject(btn.dataset.subject);
            }));
        }

                <div class="content-section quiz-table-section" id="${subject}-quiz">
                    <h2 class="section-title"><i class="fas fa-brain"></i> ${subjectNames[subject]} квиз</h2>
                    <div class="action-buttons"><button class="action-btn secondary" id="${subject}-next-team-quiz">След. команда</button><button class="action-btn primary" id="${subject}-reset-quiz">Сброс</button><button class="action-btn secondary" data-content="teams">Назад</button></div>
                    <div style="overflow-x:auto">
                        <table class="quiz-table" id="${subject}-quiz-table"><thead><tr><th>Тема</th><th>10</th><th>20</th><th>30</th><th>40</th><th>50</th></tr></thead><tbody></tbody></table>
                    </div>
                </div>
                <div class="content-section tasks-section" id="${subject}-tasks"><h2 class="section-title"><i class="fas fa-tasks"></i> Задачи</h2><div id="${subject}-tasks-container"></div><div class="action-buttons"><button class="action-btn primary" id="${subject}-next-task">Следующая</button><button class="action-btn secondary" data-content="teams">Назад</button></div></div>
                <div class="content-section scientists-section" id="${subject}-scientists"><h2 class="section-title"><i class="fas fa-user-tie"></i> Учёные</h2><div class="scientists-grid" id="${subject}-scientists-grid"></div><div class="action-buttons"><button class="action-btn secondary" data-content="teams">Назад</button></div></div>
                <div class="content-section" id="${subject}-blitz"><h2 class="section-title"><i class="fas fa-bolt"></i> Блиц-викторина</h2><div id="${subject}-blitz-container"></div><div class="action-buttons"><button class="action-btn secondary" data-content="teams">Назад</button></div></div>
            `;
            container.appendChild(div);
        }

        function updateTeamsDisplay(subject) {
            const teams = teamsData[subject];
            const container = document.getElementById(`${subject}-teams-display`);
            if (!container) return;
            container.innerHTML = '';
            teams.forEach(team => {
                const card = document.createElement('div');
                card.className = `team-card ${team.isCurrent ? 'current' : ''}`;
                card.innerHTML = `<div class="team-name"><i class="fas fa-users"></i> ${team.name}</div><div class="team-score">${team.score} баллов</div>`;
                container.appendChild(card);
            });
        }

        function nextTeam(subject) {
            const teams = teamsData[subject];
            if (teams.length < 2) return;
            const idx = teams.findIndex(t => t.isCurrent);
            teams[idx].isCurrent = false;
            teams[(idx+1) % teams.length].isCurrent = true;
            updateTeamsDisplay(subject);
        }

        function loadQuizTable(subject) {
            const quiz = quizzes[subject];
            const tbody = document.querySelector(`#${subject}-quiz-table tbody`);
            if (!tbody) return;
            tbody.innerHTML = '';
            quiz.topics.forEach((topic, ti) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = topic;
                row.cells[0].className = 'topic-cell';
                for (let pts = 10; pts <= 50; pts += 10) {
                    const cell = row.insertCell();
                    cell.className = 'question-cell';
                    const q = quiz.questions[ti]?.find(qq => qq.points === pts);
                    if (q) {
                        cell.innerHTML = `<div class="question-points">${pts}</div>`;
                        cell.dataset.topic = ti; cell.dataset.points = pts; cell.dataset.subject = subject;
                        cell.onclick = () => openQuestionModal(subject, ti, pts);
                    } else {
                        cell.innerHTML = '-';
                        cell.style.opacity = '0.5';
                        cell.style.cursor = 'default';
                    }
                }
            });
        }

        function openQuestionModal(subject, topicIdx, points) {
            const quiz = quizzes[subject];
            const q = quiz.questions[topicIdx].find(qq => qq.points === points);
            const current = teamsData[subject].find(t => t.isCurrent);
            if (!q || !current) return;
            const modal = document.getElementById('question-modal');
            const content = document.getElementById('question-data');
            content.innerHTML = `
                <h2 style="color:#00f5ff">${quiz.topics[topicIdx]} - ${points} баллов</h2>
                <div class="question-text">${q.q}</div>
                <div class="answers-container">${q.a.map((ans,i)=>`<button class="answer-btn" data-index="${i}">${ans}</button>`).join('')}</div>
                <div class="modal-controls" style="display:flex;justify-content:space-between;"><div>Отвечает: <strong>${current.name}</strong></div><button class="task-btn" id="submit-answer">Подтвердить</button></div>
            `;
            modal.classList.add('active');
            document.querySelectorAll('.answer-btn').forEach(btn => btn.onclick = function() {
                document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
            });
            document.getElementById('submit-answer').onclick = () => {
                const selected = document.querySelector('.answer-btn.selected');
                if (!selected) { alert('Выберите ответ'); return; }
                const idx = parseInt(selected.dataset.index);
                const isCorrect = idx === q.c;
                if (isCorrect) {
                    current.score += points;
                    alert(`Правильно! +${points} баллов`);
                    markQuestionAnswered(subject, topicIdx, points, true);
                } else {
                    alert(`Неверно! Правильный ответ: ${q.a[q.c]}`);
                    markQuestionAnswered(subject, topicIdx, points, false);
                }
                updateTeamsDisplay(subject);
                nextTeam(subject);
                modal.classList.remove('active');
            };
        }

        function markQuestionAnswered(subject, topic, points, correct) {
            const cell = document.querySelector(`.question-cell[data-subject="${subject}"][data-topic="${topic}"][data-points="${points}"]`);
            if (cell) {
                cell.classList.add('answered');
                if (!correct) cell.classList.add('wrong');
                cell.style.pointerEvents = 'none';
                cell.style.opacity = '0.7';
            }
        }

        function resetQuiz(subject) {
            document.querySelectorAll(`.question-cell[data-subject="${subject}"]`).forEach(cell => {
                cell.classList.remove('answered','wrong');
                cell.style.pointerEvents = 'auto';
                cell.style.opacity = '1';
            });
            teamsData[subject].forEach((t,i) => { t.score = 0; t.isCurrent = i===0; });
            updateTeamsDisplay(subject);
            alert('Квиз сброшен');
        }

        function loadTasks(subject) {
            const tasks = tasksData[subject];
            const container = document.getElementById(`${subject}-tasks-container`);
            if (!container) return;
            if (tasks.length) createTaskElement(tasks[0], subject, container);
        }

        function createTaskElement(task, subject, container) {
            container.innerHTML = `<div class="task" id="${subject}-task-${task.id}">
                <div class="task-header"><div class="task-number">Задача №${task.id} (${task.topic})</div><div class="task-attempts"><span>Попытки:</span><div class="attempt-dot"></div><div class="attempt-dot"></div><div class="attempt-dot"></div></div></div>
                <div class="task-text">${task.text}</div>
                <div class="answer-input-container"><input type="text" class="answer-input" id="${subject}-answer-${task.id}" placeholder="Ответ..."><button class="task-btn" data-id="${task.id}"><i class="fas fa-check"></i> Проверить</button></div>
                <div class="task-feedback" id="${subject}-feedback-${task.id}"></div>
            </div>`;
            container.querySelector('.task-btn').onclick = () => checkTaskAnswer(task.id, subject);
        }

        function checkTaskAnswer(taskId, subject) {
            const task = tasksData[subject].find(t => t.id === taskId);
            const input = document.getElementById(`${subject}-answer-${taskId}`);
            const fb = document.getElementById(`${subject}-feedback-${taskId}`);
            const dots = document.querySelectorAll(`#${subject}-task-${taskId} .attempt-dot`);
            let used = [...dots].filter(d => d.classList.contains('used')).length;
            if (used >= 3) { alert('Попытки исчерпаны'); return; }
            dots[used].classList.add('used');
            const user = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
            const correct = task.answer.toLowerCase();
            const isNum = !isNaN(parseFloat(user)) && !isNaN(parseFloat(correct)) && parseFloat(user) === parseFloat(correct);
            if (isNum || user === correct) {
                fb.innerHTML = `<strong>Правильно!</strong><br>${task.explanation}`;
                fb.className = 'task-feedback correct';
                const cur = teamsData[subject].find(t => t.isCurrent);
                if (cur) { cur.score += 20; updateTeamsDisplay(subject); }
            } else {
                fb.innerHTML = `<strong>Неверно!</strong> Попробуйте ещё.${used >= 2 ? `<br><br><strong>Ответ:</strong> ${task.answer}<br><strong>Объяснение:</strong> ${task.explanation}` : ''}`;
                fb.className = 'task-feedback incorrect';
                if (used >= 2) fb.innerHTML = `<strong>Исчерпаны попытки!</strong><br><strong>Ответ:</strong> ${task.answer}<br><strong>Объяснение:</strong> ${task.explanation}`;
            }
        }

        function nextTask(subject) {
            const tasks = tasksData[subject];
            const container = document.getElementById(`${subject}-tasks-container`);
            const cur = container?.querySelector('.task');
            if (!cur) return;
            const curId = parseInt(cur.id.match(/\d+$/)[0]);
            let nextIdx = tasks.findIndex(t => t.id === curId) + 1;
            if (nextIdx >= tasks.length) nextIdx = 0;
            createTaskElement(tasks[nextIdx], subject, container);
        }

        function loadScientists(subject) {
            const scientists = scientistsData[subject];
            const grid = document.getElementById(`${subject}-scientists-grid`);
            if (!grid) return;
            grid.innerHTML = '';
            scientists.forEach(s => {
                const card = document.createElement('div');
                card.className = 'scientist-card';
                card.innerHTML = `<img src="${s.image}" class="scientist-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23334155%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%239ca3af%22%3E${s.name[0]}%3C/text%3E%3C/svg%3E'"><div class="scientist-info"><div class="scientist-name">${s.name}</div><div class="scientist-field">${s.field}</div><div class="scientist-facts">${s.facts.substring(0,80)}...</div></div>`;
                card.onclick = () => openScientistModal(s);
                grid.appendChild(card);
            });
        }

        function openScientistModal(s) {
            const modal = document.getElementById('scientist-modal');
            const content = document.getElementById('scientist-data');
            content.innerHTML = `<div style="display:flex;gap:20px;flex-wrap:wrap;"><img src="${s.image}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22%23334155%22 cx=%2250%22 cy=%2250%22 r=%2245%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22%239ca3af%22%3E${s.name[0]}%3C/text%3E%3C/svg%3E'"><div><h2>${s.name}</h2><div style="color:#00f5ff;">${s.field}</div><p>${s.facts}</p></div></div><div><h3 style="margin:15px 0 10px;">Достижения:</h3>${s.achievements.map(a=>`<p><i class="fas fa-star"></i> ${a}</p>`).join('')}</div>`;
            modal.classList.add('active');
        }

        function initBlitz(subject) {
            const questions = generateBlitz(subject);
            const container = document.getElementById(`${subject}-blitz-container`);
            if (!container) return;
            let idx = 0;
            function render() {
                if (idx >= questions.length) {
                    container.innerHTML = `<div style="text-align:center;padding:40px;">🎉 Блиц завершён!</div><div class="action-buttons"><button class="action-btn secondary" data-content="teams">Назад</button></div>`;
                    return;
                }
                const q = questions[idx];
                const current = teamsData[subject].find(t => t.isCurrent);
                container.innerHTML = `
                    <div class="blitz-question"><h3>Вопрос ${idx+1}/${questions.length}</h3><p style="margin:15px 0;">${q.q}</p>
                    <div class="answers-container">${q.a.map((ans,i)=>`<button class="answer-btn" data-ans="${i}">${ans}</button>`).join('')}</div>
                    <div>Отвечает: <strong>${current.name}</strong> | Баллы: +${q.points}</div></div>`;
                document.querySelectorAll('.answer-btn').forEach(btn => btn.onclick = () => {
                    const selected = parseInt(btn.dataset.ans);
                    if (selected === q.c) {
                        current.score += q.points;
                        alert(`Правильно! +${q.points} баллов`);
                        updateTeamsDisplay(subject);
                    } else {
                        alert(`Неверно! Правильный ответ: ${q.a[q.c]}`);
                    }
                    idx++;
                    nextTeam(subject);
                    render();
                });
            }
            render();
        }

        function updateTeamsFromInputs(subject) {
            const teams = teamsData[subject];
            for (let i=0; i<3; i++) {
                const inp = document.getElementById(`${subject}-team${i+1}`);
                if (inp && inp.value.trim()) {
                    if (i < teams.length) teams[i].name = inp.value.trim();
                    else teams.push({ name: inp.value.trim(), score: 0, isCurrent: false });
                }
            }
            for (let i=teams.length-1; i>=2; i--) if (!teams[i].name?.trim()) teams.splice(i,1);
            updateTeamsDisplay(subject);
        }

        function initSubjectEvents(subject) {
            [`${subject}-team1`, `${subject}-team2`, `${subject}-team3`].forEach(id => {
                const inp = document.getElementById(id);
                if (inp) inp.addEventListener('input', () => updateTeamsFromInputs(subject));
            });
            document.getElementById(`${subject}-next-team`)?.addEventListener('click', () => nextTeam(subject));
            document.getElementById(`${subject}-next-team-quiz`)?.addEventListener('click', () => nextTeam(subject));
            document.getElementById(`${subject}-reset-quiz`)?.addEventListener('click', () => resetQuiz(subject));
            document.getElementById(`${subject}-next-task`)?.addEventListener('click', () => nextTask(subject));
        }

        function showContentSection(subject, content) {
            const sections = document.querySelectorAll(`#${subject}-content .content-section`);
            sections.forEach(s => s.classList.remove('active'));
            const target = document.getElementById(`${subject}-${content}`);
            if (target) target.classList.add('active');
        }

        function startSubject(subject) {
            currentSubject = subject;
            document.getElementById('subject-selection').style.display = 'none';
            document.querySelectorAll('.subject-content').forEach(c => c.classList.remove('active'));
            createSubjectContent(subject);
            document.getElementById(`${subject}-content`).classList.add('active');
            document.querySelectorAll('.subject-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.subject-btn.${subject}`).classList.add('active');
            updateTeamsDisplay(subject);
            loadQuizTable(subject);
            loadTasks(subject);
            loadScientists(subject);
            initBlitz(subject);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderSubjectSelection();
            renderSubjectNav();
            subjectsList.forEach(sub => createSubjectContent(sub));
            document.addEventListener('click', e => {
                const btn = e.target.closest('[data-content]');
                if (btn && currentSubject) showContentSection(currentSubject, btn.dataset.content);
            });
            document.getElementById('close-question-modal')?.addEventListener('click', () => document.getElementById('question-modal').classList.remove('active'));
            document.getElementById('close-scientist-modal')?.addEventListener('click', () => document.getElementById('scientist-modal').classList.remove('active'));
            subjectsList.forEach(sub => initSubjectEvents(sub));
        });
    </script>
</body>
</html>
