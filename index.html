<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир в науке | Неоновая платформа</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a0a0f;
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.08) 0%, transparent 50%);
            color: #e0e0ff;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 35px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #0ff, #f0f);
            width: 48px;
            height: 48px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 0 15px #0ff;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: #8a8aae;
        }

        .subject-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .subject-btn {
            padding: 6px 16px;
            background: rgba(20, 20, 40, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 40px;
            color: #ccc;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .subject-btn:hover {
            border-color: #0ff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .subject-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            border-color: #0ff;
            color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .subject-selection {
            text-align: center;
            padding: 40px 20px;
        }

        .selection-title {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0ff, #f0f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .selection-subtitle {
            color: #8a8aae;
            margin-bottom: 50px;
        }

        .subject-cards {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .subject-card {
            background: rgba(15, 15, 30, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 30px 20px;
            width: 260px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s;
        }

        .subject-card:hover {
            transform: translateY(-8px);
            border-color: #0ff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        .subject-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .subject-card.math .subject-icon { color: #0ff; text-shadow: 0 0 10px #0ff; }
        .subject-card.physics .subject-icon { color: #f0f; text-shadow: 0 0 10px #f0f; }
        .subject-card.chemistry .subject-icon { color: #0f0; text-shadow: 0 0 10px #0f0; }
        .subject-card.biology .subject-icon { color: #ff0; text-shadow: 0 0 10px #ff0; }
        .subject-card.computer .subject-icon { color: #f90; text-shadow: 0 0 10px #f90; }
        .subject-card.society .subject-icon { color: #ff69b4; text-shadow: 0 0 10px #ff69b4; }
        .subject-card.history .subject-icon { color: #ffa500; text-shadow: 0 0 10px #ffa500; }

        .subject-card h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .subject-card p {
            font-size: 0.75rem;
            color: #8a8aae;
            margin-bottom: 15px;
        }

        .subject-content {
            display: none;
        }

        .subject-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 8px 22px;
            background: rgba(15, 15, 35, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            color: #aaa;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            border-color: #0ff;
            color: #0ff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        .panel {
            display: none;
            background: rgba(10, 10, 25, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(0, 255, 255, 0.25);
        }

        .panel.active {
            display: block;
        }

        .teams-control {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .team-input-box {
            flex: 1;
            min-width: 170px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 8px 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .team-input-box label {
            font-size: 0.7rem;
            color: #0ff;
            display: block;
            margin-bottom: 5px;
        }

        .team-input-box input {
            width: 100%;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            color: white;
        }

        .team-input-box input:focus {
            border-color: #0ff;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }

        .teams-list {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .team-card {
            background: linear-gradient(135deg, #0a0a1a, #050510);
            border-radius: 20px;
            padding: 12px 20px;
            min-width: 150px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.4);
            position: relative;
        }

        .team-card.current {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            border-color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .team-card.current::after {
            content: 'ХОД';
            position: absolute;
            top: 5px;
            right: 10px;
            background: #0ff;
            color: #000;
            padding: 2px 8px;
            border-radius: 15px;
            font-size: 0.6rem;
            font-weight: bold;
        }

        .team-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .team-score {
            font-size: 1.4rem;
            font-weight: 800;
            color: #0ff;
        }

        .quiz-table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }

        .quiz-table th, .quiz-table td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
            font-size: 0.9rem;
        }

        .quiz-table th {
            background: rgba(0, 0, 0, 0.5);
            color: #0ff;
            font-size: 1rem;
        }

        .topic-cell {
            background: rgba(0, 255, 255, 0.08);
            font-weight: 600;
            text-align: left;
        }

        .question-cell {
            cursor: pointer;
            transition: all 0.2s;
        }

        .question-cell:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .question-points {
            font-weight: 700;
            color: #0ff;
            font-size: 1.1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0a0a1a;
            border-radius: 28px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 15px;
            background: rgba(255, 0, 0, 0.6);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            color: white;
            cursor: pointer;
        }

        .answers-list {
            display: grid;
            gap: 10px;
            margin: 20px 0;
        }

        .answer-option {
            background: #0f0f1f;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .answer-option:hover {
            border-color: #0ff;
            background: rgba(0, 255, 255, 0.1);
        }

        .answer-option.selected {
            border-color: #0ff;
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .task-item {
            background: #0a0a1a;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            border-left: 4px solid #0ff;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .task-attempts {
            display: flex;
            gap: 5px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #334;
            display: inline-block;
        }

        .dot.used {
            background: #f0f;
            box-shadow: 0 0 5px #f0f;
        }

        .answer-row {
            display: flex;
            gap: 12px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .answer-row input {
            flex: 1;
            padding: 8px 16px;
            background: #0f0f1f;
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
        }

        .answer-row input:focus {
            border-color: #0ff;
            outline: none;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0ff, #f0f);
            border: none;
            border-radius: 40px;
            padding: 8px 24px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .feedback {
            margin-top: 12px;
            padding: 10px;
            border-radius: 15px;
            display: none;
        }

        .feedback.correct {
            background: rgba(0, 255, 0, 0.15);
            border: 1px solid #0f0;
            display: block;
        }

        .feedback.incorrect {
            background: rgba(255, 0, 255, 0.15);
            border: 1px solid #f0f;
            display: block;
        }

        .scientists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }

        .scientist-card {
            background: #0a0a1a;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.3);
            text-align: center;
            padding: 16px;
        }

        .scientist-card:hover {
            border-color: #0ff;
            transform: translateY(-3px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .scientist-avatar {
            font-size: 3rem;
            color: #0ff;
            margin-bottom: 8px;
        }

        .scientist-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .scientist-field {
            font-size: 0.7rem;
            color: #0ff;
            margin-bottom: 6px;
        }

        .scientist-facts {
            font-size: 0.7rem;
            color: #8a8aae;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 22px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 30, 50, 0.8);
            color: #ccc;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            color: #0ff;
            border-color: #0ff;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        footer {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #6a6a8a;
            margin-top: 40px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
        }

        @media (max-width: 700px) {
            .container { padding: 15px; }
            .subject-card { width: 100%; max-width: 250px; }
            .quiz-table th, .quiz-table td { padding: 6px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-atom"></i></div>
            <div class="logo-text">
                <h1>Мир в науке</h1>
                <p>Математика • Физика • Химия • Биология • Информатика • Обществознание • История</p>
            </div>
        </div>
        <div class="subject-nav" id="subjectNav"></div>

    <div id="mainContent"></div>

    <footer>Разработано студентами ТТИТ: Болохова Ксения, Луговской Данил</footer>
</div>

<div id="scientistModal" class="modal"><div class="modal-content"><button class="close-modal" id="closeScientistModal"><i class="fas fa-times"></i></button><div id="scientistContent"></div></div></div>

const subjectsData = {

let teams = {

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

const quizzes = {
    math: {
        topics: ['Тригонометрия','Логарифмы','Производные','Интегралы','Вероятность'],
        questions: [
            [{p:10,q:'sin(π/6)?',a:['1/2','√2/2','√3/2','1'],c:0},{p:20,q:'2sin²x-1=0 на [0,2π]',a:['π/4,3π/4','π/4,3π/4,5π/4,7π/4','π/2,3π/2','0,π'],c:1},{p:30,q:'(sinα+cosα)²+(sinα-cosα)²',a:['1','2','sin²α+cos²α','0'],c:1},{p:40,q:'sin75°·cos15°',a:['1/4','1/2','√3/4','(√6+√2)/4'],c:0},{p:50,q:'sinx+cosx=1',a:['x=2πk, x=π/2+2πk','x=πk, x=π/2+2πk','x=0,π/2','x=π/2+2πk'],c:0}],
            [{p:10,q:'log₂8?',a:['2','3','4','5'],c:1},{p:20,q:'log₃(x+1)=2',a:['8','9','10','11'],c:0},{p:30,q:'log₅125+log₅25-log₅5',a:['3','4','5','6'],c:1},{p:40,q:'log₀.₅(2x-1)>2',a:['x<1.25','x>1.25','0.5<x<0.625','x<0.5'],c:2},{p:50,q:'2ˣ·3ʸ=72, log₂x+log₂y=3',a:['x=6,y=2','x=8,y=1','x=4,y=4','x=3,y=4'],c:0}],
            [{p:10,q:'x³ производная',a:['3x²','3x','x²','2x²'],c:0},{p:20,q:'eˣ+lnx',a:['eˣ+1/x','eˣ-1/x','eˣ+x','eˣ-x'],c:0},{p:30,q:'sin(2x+1) производная',a:['2cos(2x+1)','cos(2x+1)','-2cos','2sin'],c:0},{p:40,q:'x·eˣ производная',a:['eˣ(x+1)','eˣ','x·eˣ','eˣ(x-1)'],c:0},{p:50,q:'ln(x²+1) производная',a:['2x/(x²+1)','1/(x²+1)','2x','2/(x²+1)'],c:0}],
            [{p:10,q:'∫x² dx',a:['x³/3+C','x³+C','2x+C','x²/2+C'],c:0},{p:20,q:'∫eˣ dx',a:['eˣ+C','eˣ/x+C','lnx+C','x·eˣ+C'],c:0},{p:30,q:'∫₀¹(2x+3)dx',a:['4','5','3','6'],c:0},{p:40,q:'∫cosx dx',a:['sinx+C','-sinx+C','cosx+C','-cosx+C'],c:0},{p:50,q:'∫1/x dx',a:['ln|x|+C','1/x²+C','-1/x²+C','lnx+C'],c:0}],
            [{p:10,q:'P(орла)',a:['1/2','1/3','1/4','1'],c:0},{p:20,q:'Сумма 7 на двух костях',a:['1/6','1/12','1/36','1/18'],c:0},{p:30,q:'5 красных,3 синих, P(красный)',a:['5/8','3/8','1/2','5/3'],c:0},{p:40,q:'P₁=0.8,P₂=0.6, оба попадут',a:['0.48','0.14','0.9','1.4'],c:0},{p:50,q:'0.7 проработает, из 3 хотя бы одна',a:['0.973','0.3','0.7','0.027'],c:0}]
        ]
    },
    physics: {
        topics: ['Механика','Термодинамика','Электродинамика','Оптика','Кванты'],
        questions: [

function updateTeamsDisplay(subject) {
    const container = document.getElementById(`${subject}TeamsList`);
    if (!container) return;
    container.innerHTML = '';
    teams[subject].forEach(team => {
        const card = document.createElement('div');
        card.className = `team-card ${team.isCurrent ? 'current' : ''}`;
        card.innerHTML = `<div class="team-name">${team.name}</div><div class="team-score">${team.score} баллов</div>`;
        container.appendChild(card);
    });
}

function updateTeamsFromInputs(subject) {
    for (let i = 0; i < 3; i++) {
        const inp = document.getElementById(`${subject}Team${i+1}`);
        if (inp && inp.value.trim()) {
            if (i < teams[subject].length) teams[subject][i].name = inp.value.trim();
            else teams[subject].push({ name: inp.value.trim(), score: 0, isCurrent: false });
        }
    }
    for (let i = teams[subject].length - 1; i >= 2; i--) if (!teams[subject][i].name?.trim()) teams[subject].splice(i, 1);
    updateTeamsDisplay(subject);
}

function nextTeam(subject) {
    if (teams[subject].length < 2) return;
    const idx = teams[subject].findIndex(t => t.isCurrent);
    teams[subject][idx].isCurrent = false;
    teams[subject][(idx + 1) % teams[subject].length].isCurrent = true;
    updateTeamsDisplay(subject);
}

function loadQuizTable(subject) {
    const quiz = quizzes[subject];
    const tbody = document.querySelector(`#${subject}QuizTable tbody`);
    if (!tbody) return;
    tbody.innerHTML = '';
    quiz.topics.forEach((topic, ti) => {
        const row = tbody.insertRow();
        row.insertCell(0).textContent = topic;
        row.cells[0].className = 'topic-cell';
        for (let pts = 10; pts <= 50; pts += 10) {
            const cell = row.insertCell();
            cell.className = 'question-cell';
            const q = quiz.questions[ti]?.find(qq => qq.p === pts);
            if (q) {
                cell.innerHTML = `<div class="question-points">${pts}</div>`;
                cell.onclick = () => openQuestionModal(subject, ti, pts);
            } else { cell.innerHTML = '-'; cell.style.opacity = '0.5'; }
        }
    });
}

function openQuestionModal(subject, topicIdx, points) {
    const original = quizzes[subject].questions[topicIdx].find(q => q.p === points);
    if (!original) return;
    const answers = shuffleArray([...original.a]);
    const correctIndex = answers.indexOf(original.a[original.c]);
    const current = teams[subject].find(t => t.isCurrent);
    const modal = document.getElementById('questionModal');
    document.getElementById('questionContent').innerHTML = `
        <h2 style="color:#0ff;">${quizzes[subject].topics[topicIdx]} - ${points} баллов</h2>
        <div style="margin:20px 0;">${original.q}</div>
        <div class="answers-list">${answers.map((a,i) => `<div class="answer-option" data-ans="${i}">${a}</div>`).join('')}</div>
        <div style="display:flex; justify-content:space-between;"><div>Отвечает: <strong style="color:#0ff;">${current.name}</strong></div><button class="btn-submit" id="submitAnswer">Подтвердить</button></div>
    `;
    modal.classList.add('active');
    let selected = null;
    document.querySelectorAll('.answer-option').forEach(opt => {
        opt.onclick = () => { document.querySelectorAll('.answer-option').forEach(o => o.classList.remove('selected')); opt.classList.add('selected'); selected = parseInt(opt.dataset.ans); };
    });
    document.getElementById('submitAnswer').onclick = () => {
        if (selected === null) { alert('Выберите ответ'); return; }
        if (selected === correctIndex) {
            current.score += points;
            alert(`Правильно! +${points} баллов`);
            const cells = document.querySelectorAll(`#${subject}QuizTable .question-cell`);
            cells.forEach(cell => { if (cell.innerHTML.includes(points)) { cell.style.pointerEvents = 'none'; cell.style.opacity = '0.6'; } });
        } else { alert(`Неверно! Ответ: ${original.a[original.c]}`); }
        updateTeamsDisplay(subject);
        nextTeam(subject);
        modal.classList.remove('active');
    };
}

function resetQuiz(subject) {
    document.querySelectorAll(`#${subject}QuizTable .question-cell`).forEach(cell => { cell.style.pointerEvents = 'auto'; cell.style.opacity = '1'; });
    teams[subject].forEach((t,i) => { t.score = 0; t.isCurrent = i === 0; });
    updateTeamsDisplay(subject);
    alert('Квиз сброшен');
}

function loadTasks(subject) {
    const tasks = tasksData[subject];
    const container = document.getElementById(`${subject}TasksContainer`);
    if (!container) return;
    let idx = 0;
    function render() {
        if (idx >= tasks.length) { container.innerHTML = `<div style="text-align:center;padding:40px;">🏆 Все задачи решены!</div>`; return; }
        const task = tasks[idx];
        let attempts = 0;
        container.innerHTML = `<div class="task-item"><div class="task-header"><div>Задача ${idx+1}/${tasks.length}</div><div class="task-attempts">Попытки: <span id="attemptCounter">0</span>/3</div></div><div style="margin:15px 0;">${task.text}</div><div class="answer-row"><input type="text" id="taskInput" placeholder="Ответ..."><button class="btn-submit" id="taskSubmit">Проверить</button></div><div id="taskFeedback" class="feedback"></div></div>`;
        const input = document.getElementById('taskInput');
        const fb = document.getElementById('taskFeedback');
        const counter = document.getElementById('attemptCounter');
        document.getElementById('taskSubmit').onclick = () => {
            if (!input.value.trim()) { alert('Введите ответ'); return; }
            if (attempts >= 3) { alert('Попытки исчерпаны'); return; }
            const user = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
            const correct = task.answer.toLowerCase();
            const isNum = !isNaN(parseFloat(user)) && !isNaN(parseFloat(correct)) && parseFloat(user) === parseFloat(correct);
            if (isNum || user === correct) {
                fb.innerHTML = `<strong>Правильно!</strong><br>${task.explanation}`;
                fb.className = 'feedback correct';
                const cur = teams[subject].find(t => t.isCurrent);
                if (cur) { cur.score += 20; updateTeamsDisplay(subject); }
                idx++; setTimeout(render, 1000);
            } else {
                attempts++;
                counter.textContent = attempts;
                if (attempts >= 3) {
                    fb.innerHTML = `<strong>Исчерпаны попытки!</strong><br>Ответ: ${task.answer}<br>${task.explanation}`;
                    fb.className = 'feedback incorrect';
                    idx++; setTimeout(render, 1500);
                } else { fb.innerHTML = `<strong>Неверно!</strong> Осталось: ${3-attempts}`; fb.className = 'feedback incorrect'; }
            }
        };
    }
    render();
}

function loadScientists(subject) {
    const scientists = scientistsData[subject];
    const grid = document.getElementById(`${subject}ScientistsGrid`);
    if (!grid) return;
    grid.innerHTML = '';
    scientists.forEach(s => {
        const card = document.createElement('div');
        card.className = 'scientist-card';
        card.innerHTML = `<div class="scientist-avatar"><i class="fas fa-user-graduate"></i></div><div class="scientist-name">${s.name}</div><div class="scientist-field">${s.field}</div><div class="scientist-facts">${s.facts}</div>`;
        card.onclick = () => {
            const modal = document.getElementById('scientistModal');
            document.getElementById('scientistContent').innerHTML = `<div style="text-align:center;"><div class="scientist-avatar" style="font-size:4rem;"><i class="fas fa-user-graduate"></i></div><h2 style="color:#0ff;">${s.name}</h2><div style="color:#f0f;">${s.field}</div><p style="margin:15px 0;">${s.facts}</p><div><h3>Достижения:</h3>${s.achievements.map(a => `<p><i class="fas fa-star" style="color:#ff0;"></i> ${a}</p>`).join('')}</div></div>`;
            modal.classList.add('active');
        };
        grid.appendChild(card);
    });
}

function initBlitz(subject) {
    const questions = blitzData[subject];
    const container = document.getElementById(`${subject}BlitzContainer`);
    if (!container) return;
    let idx = 0;
    function render() {
        if (idx >= questions.length) { container.innerHTML = `<div style="text-align:center;padding:40px;">🎉 Блиц завершён!</div>`; return; }
        const q = questions[idx];
        const current = teams[subject].find(t => t.isCurrent);
        const shuffled = shuffleArray([...q.a]);
        const correctIdx = shuffled.indexOf(q.a[q.c]);
        container.innerHTML = `<div><h3>Вопрос ${idx+1}/${questions.length}</h3><p style="margin:20px 0;">${q.q}</p><div class="answers-list">${shuffled.map((a,i) => `<div class="answer-option" data-ans="${i}">${a}</div>`).join('')}</div><div style="margin-top:15px;">Отвечает: <strong style="color:#0ff;">${current.name}</strong> | +${q.points} баллов</div><button class="btn-submit" id="blitzSubmit" style="margin-top:15px;">Ответить</button></div>`;
        let selected = null;
        document.querySelectorAll('.answer-option').forEach(opt => { opt.onclick = () => { document.querySelectorAll('.answer-option').forEach(o => o.classList.remove('selected')); opt.classList.add('selected'); selected = parseInt(opt.dataset.ans); }; });
        document.getElementById('blitzSubmit').onclick = () => {
            if (selected === null) { alert('Выберите ответ'); return; }
            if (selected === correctIdx) { current.score += q.points; alert(`Правильно! +${q.points} баллов`); updateTeamsDisplay(subject); }
            else { alert(`Неверно! Ответ: ${q.a[q.c]}`); }
            idx++; nextTeam(subject); render();
        };
    }
    render();
}

function initSubjectEvents(subject) {
    const content = document.getElementById(`${subject}Content`);
    content.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            content.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const tab = btn.dataset.tab;
            content.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`${subject}${tab.charAt(0).toUpperCase() + tab.slice(1)}Panel`).classList.add('active');
            if (tab === 'tasks') loadTasks(subject);
            if (tab === 'scientists') loadScientists(subject);
            if (tab === 'blitz') initBlitz(subject);
            if (tab === 'quiz') loadQuizTable(subject);
        };
    });
}

function startSubject(subject) {
    currentSubject = subject;
    document.querySelectorAll('.subject-btn').forEach(btn => btn.classList.remove('active'));
    const btn = Array.from(document.querySelectorAll('.subject-btn')).find(b => b.innerHTML.includes(subjectsData[subject].icon));
    if (btn) btn.classList.add('active');
    createSubjectContent(subject);
    document.querySelectorAll('.subject-content').forEach(c => c.classList.remove('active'));
    document.getElementById(`${subject}Content`).classList.add('active');
    updateTeamsDisplay(subject);
    loadQuizTable(subject);
    initSubjectEvents(subject);
}

document.addEventListener('DOMContentLoaded', () => {
    renderSubjectSelection();
    renderSubjectNav();
    document.getElementById('closeQuestionModal').onclick = () => document.getElementById('questionModal').classList.remove('active');
    document.getElementById('closeScientistModal').onclick = () => document.getElementById('scientistModal').classList.remove('active');
    window.onclick = (e) => { if (e.target.classList.contains('modal')) e.target.classList.remove('active'); };
});
</script>
</body>
